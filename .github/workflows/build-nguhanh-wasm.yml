name: Build Nguhanh WASM

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/build-nguhanh-wasm.yml"
      - "src/**"
      - "scripts/**"
  pull_request:
    paths:
      - ".github/workflows/build-nguhanh-wasm.yml"
      - "src/**"
      - "scripts/**"

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      EMSDK_VERSION: 3.1.64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential make git python3 nodejs

      - name: Build native engine
        working-directory: src
        run: |
          make -j"$(nproc)" ARCH=x86-64 build

      - name: Verify native nguhanh variant
        working-directory: src
        run: |
          {
            echo "uci"
            echo "setoption name UCI_Variant value nguhanh"
            echo "ucinewgame"
            echo "position startpos"
            echo "d"
            echo "go perft 1"
            echo "quit"
          } | ./stockfish > ../native-uci.log

          cat ../native-uci.log
          grep -qi "nguhanh" ../native-uci.log
          grep -qi "Nodes searched" ../native-uci.log

      - name: Install Emscripten and build WASM
        working-directory: src
        run: |
          git clone --depth 1 https://github.com/emscripten-core/emsdk.git "$RUNNER_TEMP/emsdk"

          "$RUNNER_TEMP/emsdk/emsdk" install "$EMSDK_VERSION"
          "$RUNNER_TEMP/emsdk/emsdk" activate "$EMSDK_VERSION"

          source "$RUNNER_TEMP/emsdk/emsdk_env.sh"

          emcc -v
          wasm-opt --version

          mkdir -p ../dist
          make -f Makefile_js -j"$(nproc)" build EXE=../dist/stockfish.js

          if [ -f stockfish.worker.js ]; then
            cp stockfish.worker.js ../dist/stockfish.worker.js
          fi

          ls -lah ../dist
          test -s ../dist/stockfish.js
          test -s ../dist/stockfish.wasm

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: nguhanh-stockfish-wasm
          path: |
            dist/stockfish.js
            dist/stockfish.wasm
            dist/stockfish.worker.js
          if-no-files-found: error
